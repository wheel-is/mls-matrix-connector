name: Windows release smoke test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out the installer
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Parse with Windows PowerShell 5.1
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $Source = [IO.File]::ReadAllText((Join-Path $PWD "install-mls-matrix.ps1"))
          [void][ScriptBlock]::Create($Source)

      - name: Seed an existing Microsoft Store Claude config
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $ClaudeDirectory = Join-Path $env:LOCALAPPDATA "Packages\Claude_fixture\LocalCache\Roaming\Claude"
          $ConfigPath = Join-Path $ClaudeDirectory "claude_desktop_config.json"
          [void](New-Item -ItemType Directory -Path $ClaudeDirectory -Force)
          $Fixture = [pscustomobject][ordered]@{
              theme = "fixture-dark"
              mcpServers = [pscustomobject][ordered]@{
                  ExistingFixture = [pscustomobject][ordered]@{
                      command = "fixture-command"
                      args = @("--safe")
                  }
              }
          }
          $Json = $Fixture | ConvertTo-Json -Depth 10
          $Utf8WithoutBom = New-Object System.Text.UTF8Encoding($false)
          [IO.File]::WriteAllText($ConfigPath, "$Json`r`n", $Utf8WithoutBom)

          $StandardDirectory = Join-Path $env:APPDATA "Claude"
          $StandardConfigPath = Join-Path $StandardDirectory "claude_desktop_config.json"
          [void](New-Item -ItemType Directory -Path $StandardDirectory -Force)
          $StandardFixture = [pscustomobject][ordered]@{
              mcpServers = [pscustomobject][ordered]@{
                  StandardOnly = [pscustomobject][ordered]@{ command = "wrong-config"; args = @() }
              }
          }
          $StandardJson = $StandardFixture | ConvertTo-Json -Depth 10
          [IO.File]::WriteAllText($StandardConfigPath, "$StandardJson`r`n", $Utf8WithoutBom)

      - name: Run the exact installer without browser login
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .\install-mls-matrix.ps1 -SkipLogin
          if ($LASTEXITCODE -ne 0) {
              throw "Installer failed with exit code $LASTEXITCODE."
          }

      - name: Verify installation and Claude Desktop config
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $InstallRoot = Join-Path $env:LOCALAPPDATA "MLSMatrixConnector"
          $ServerPath = Join-Path $InstallRoot "dist\mcp-server.js"
          $CliPath = Join-Path $InstallRoot "dist\cli.js"
          if (-not (Test-Path -LiteralPath $ServerPath -PathType Leaf)) {
              throw "The installed MCP server was not found."
          }
          if (-not (Test-Path -LiteralPath $CliPath -PathType Leaf)) {
              throw "The installed CLI was not found."
          }

          $ConfigPath = Join-Path $env:LOCALAPPDATA "Packages\Claude_fixture\LocalCache\Roaming\Claude\claude_desktop_config.json"
          $Config = [IO.File]::ReadAllText($ConfigPath) | ConvertFrom-Json
          $Server = $Config.mcpServers.MLSListingsMatrix
          if ($null -eq $Server) {
              throw "Claude Desktop config is missing MLSListingsMatrix."
          }
          if ($Config.theme -ne "fixture-dark" -or $Config.mcpServers.ExistingFixture.command -ne "fixture-command") {
              throw "The installer did not preserve the existing Claude Desktop config."
          }
          $StandardConfigPath = Join-Path $env:APPDATA "Claude\claude_desktop_config.json"
          $StandardConfig = [IO.File]::ReadAllText($StandardConfigPath) | ConvertFrom-Json
          if ($null -ne $StandardConfig.mcpServers.MLSListingsMatrix) {
              throw "The installer updated the standard config instead of the Microsoft Store config."
          }
          if (-not (Test-Path -LiteralPath $Server.command -PathType Leaf)) {
              throw "Claude Desktop config points to a missing Node executable."
          }
          if ($Server.args.Count -ne 1 -or $Server.args[0] -ne $ServerPath) {
              throw "Claude Desktop config contains the wrong MCP server path."
          }

          $Version = @(& $Server.command $CliPath --version)
          if ($LASTEXITCODE -ne 0 -or ($Version -join "").Trim() -ne "0.2.0") {
              throw "The installed connector did not report version 0.2.0."
          }
          $StagingDirectories = @(Get-ChildItem -LiteralPath $env:LOCALAPPDATA -Directory -Filter "MLSMatrixConnector-Staging-*" -ErrorAction SilentlyContinue)
          if ($StagingDirectories.Count -ne 0) {
              throw "The installer left a staging directory behind."
          }
